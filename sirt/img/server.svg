<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#16B7CC" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0L0 0 0 28" fill="none" stroke="#16B7CC" stroke-width="0.25" opacity="0.18"/>
    </pattern>
    <style>
      .b1{animation:blink1 1.9s ease-in-out infinite}
      .b2{animation:blink1 2.6s ease-in-out infinite .7s}
      .b3{animation:blink1 2.2s ease-in-out infinite 1.3s}
      .b4{animation:blink1 3.1s ease-in-out infinite .4s}
      .pulse{animation:pulse 2s ease-in-out infinite}
      .bar{animation:barfill 3s ease-in-out infinite alternate}
      @keyframes blink1{0%,85%,100%{opacity:1}90%{opacity:.15}}
      @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
      @keyframes barfill{0%{opacity:.6}100%{opacity:.95}}
    </style>
  </defs>

