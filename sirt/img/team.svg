<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440">
  <defs>
    <radialGradient id="tg" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#16B7CC" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
    </radialGradient>
    <filter id="gt">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="tgrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0L0 0 0 24" fill="none" stroke="#1E3A5F" stroke-width="0.3" opacity="0.5"/>
    </pattern>
    <style>
      .tp1{animation:tpulse 2.5s ease-in-out infinite}
      .tp2{animation:tpulse 3s ease-in-out infinite .8s}
      .tp3{animation:tpulse 2.8s ease-in-out infinite 1.5s}
      .tb1{animation:tblink 1.8s ease-in-out infinite}
      @keyframes tpulse{0%,100%{opacity:.5}50%{opacity:1}}
      @keyframes tblink{0%,80%,100%{opacity:1}85%{opacity:.1}}
    </style>
  </defs>

