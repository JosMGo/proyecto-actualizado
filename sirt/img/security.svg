<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440">
  <defs>
    <radialGradient id="sg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
    </radialGradient>
    <filter id="gs">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="wall" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#0C1422" stroke="#111827" stroke-width="0.5"/>
    </pattern>
    <style>
      .r1{animation:rec 1.2s step-end infinite}
      .p1{animation:pp 2s ease-in-out infinite}
      .p2{animation:pp 2.5s ease-in-out infinite .6s}
      .p3{animation:pp 3s ease-in-out infinite 1.2s}
      .sc{animation:scan 4s linear infinite}
      @keyframes rec{0%,49%{opacity:1}50%,100%{opacity:0}}
      @keyframes pp{0%,100%{opacity:.5}50%{opacity:1}}
      @keyframes scan{0%{opacity:0.8;transform:rotate(-30deg)}100%{opacity:0;transform:rotate(30deg)}}
    </style>
  </defs>

  <rect width="640" height="440" fill="#0B1120"/>
  <rect width="640" height="440" fill="url(#sg)"/>
  <rect x="0" y="200" width="640" height="240" fill="url(#wall)" opacity=".4"/>

  <!-- ═══ MONITOR / NVR SCREEN ═══ -->
  <rect x="180" y="40" width="280" height="195" rx="8" fill="#080E1A" stroke="#1E3A5F" stroke-width="2"/>
  <!-- Screen border glow -->
  <rect x="180" y="40" width="280" height="195" rx="8" fill="none" stroke="#16B7CC" stroke-width=".5" opacity=".5"/>
  <!-- Screen divided into 4 camera feeds -->
  <line x1="320" y1="42" x2="320" y2="233" stroke="#1E3A5F" stroke-width="1"/>
  <line x1="182" y1="137" x2="458" y2="137" stroke="#1E3A5F" stroke-width="1"/>

  <!-- Feed 1 (top-left): parking -->
  <rect x="182" y="42" width="136" height="93" fill="#0A1020"/>
  <text x="250" y="73" text-anchor="middle" fill="#1E3A5F" font-size="8" font-family="monospace">PARQ-01</text>
  <!-- Car shapes -->
  <rect x="200" y="85" width="30" height="14" rx="2" fill="#1a2540"/>
  <rect x="240" y="78" width="30" height="14" rx="2" fill="#1a2540" opacity=".7"/>
  <!-- Camera scan line -->
  <rect x="182" y="72" width="136" height="1" fill="#16B7CC" opacity=".3" class="p1"/>
  <!-- Timestamp -->
  <text x="188" y="52" fill="#16B7CC" font-size="6" font-family="monospace">2024-01-15 14:32:08</text>
  <text x="188" y="62" fill="#94A3B8" font-size="6" font-family="monospace">CAM-1 · EXTERIOR</text>
  <!-- REC indicator -->
  <circle cx="308" cy="50" r="4" fill="#EF4444" class="r1"/>
  <text x="300" y="53" text-anchor="end" fill="#EF4444" font-size="6" font-family="monospace">REC</text>

  <!-- Feed 2 (top-right): office -->
  <rect x="322" y="42" width="134" height="93" fill="#0A1020"/>
  <text x="389" y="73" text-anchor="middle" fill="#1E3A5F" font-size="8" font-family="monospace">OFIC-01</text>
  <rect x="340" y="80" width="20" height="28" rx="2" fill="#1a2540"/>
  <rect x="368" y="82" width="20" height="26" rx="2" fill="#1a2540" opacity=".7"/>
  <rect x="400" y="79" width="20" height="30" rx="2" fill="#1a2540" opacity=".5"/>
  <!-- People shapes (simple) -->
  <circle cx="350" cy="78" r="4" fill="#2a3550"/>
  <circle cx="378" cy="80" r="4" fill="#2a3550" opacity=".8"/>
  <text x="328" y="52" fill="#16B7CC" font-size="6" font-family="monospace">2024-01-15 14:32:08</text>
  <text x="328" y="62" fill="#94A3B8" font-size="6" font-family="monospace">CAM-2 · INTERIOR</text>
  <circle cx="450" cy="50" r="4" fill="#22C55E" class="p2"/>
  <text x="442" y="53" text-anchor="end" fill="#22C55E" font-size="6" font-family="monospace">LIVE</text>

  <!-- Feed 3 (bottom-left): entrance with motion alert -->
  <rect x="182" y="139" width="136" height="92" fill="#0D1218"/>
  <!-- Motion alert overlay -->
  <rect x="182" y="139" width="136" height="92" fill="#EF4444" opacity=".04"/>
  <rect x="182" y="139" width="136" height="92" fill="none" stroke="#EF4444" stroke-width="1" opacity=".5" class="r1"/>
  <text x="250" y="168" text-anchor="middle" fill="#1E3A5F" font-size="8" font-family="monospace">ENTR-01</text>
  <text x="188" y="149" fill="#16B7CC" font-size="6" font-family="monospace">2024-01-15 14:32:08</text>
  <text x="188" y="159" fill="#94A3B8" font-size="6" font-family="monospace">CAM-3 · ENTRADA</text>
  <!-- Motion detected badge -->
  <rect x="190" y="192" width="80" height="12" rx="3" fill="#EF4444" opacity=".8" class="r1"/>
  <text x="230" y="201" text-anchor="middle" fill="white" font-size="7" font-family="monospace">⚠ MOVIMIENTO</text>
  <!-- Person silhouette -->
  <circle cx="300" cy="185" r="6" fill="#2a3550"/>
  <rect x="294" y="191" width="12" height="20" rx="2" fill="#2a3550"/>
  <circle cx="300" cy="185" r="6" fill="#EF4444" opacity=".2" class="r1"/>

  <!-- Feed 4 (bottom-right): server room -->
  <rect x="322" y="139" width="134" height="92" fill="#0A1020"/>
  <text x="389" y="168" text-anchor="middle" fill="#1E3A5F" font-size="8" font-family="monospace">SERV-01</text>
  <!-- Server rack mini -->
  <rect x="355" y="170" width="24" height="44" rx="2" fill="#1a2540" stroke="#16B7CC" stroke-width=".5"/>
  <rect x="360" y="174" width="14" height="5" rx="1" fill="#111827"/>
  <rect x="360" y="181" width="14" height="5" rx="1" fill="#111827"/>
  <rect x="360" y="188" width="14" height="5" rx="1" fill="#111827"/>
  <circle cx="362" cy="177" r="1.5" fill="#22C55E" class="p3"/>
  <circle cx="362" cy="184" r="1.5" fill="#16B7CC" class="p1"/>
  <rect x="390" y="170" width="24" height="44" rx="2" fill="#1a2540" stroke="#16B7CC" stroke-width=".5"/>
  <rect x="395" y="174" width="14" height="5" rx="1" fill="#111827"/>
  <rect x="395" y="181" width="14" height="5" rx="1" fill="#111827"/>
  <circle cx="397" cy="177" r="1.5" fill="#22C55E" class="p2"/>
  <text x="328" y="149" fill="#16B7CC" font-size="6" font-family="monospace">2024-01-15 14:32:08</text>
  <text x="328" y="159" fill="#94A3B8" font-size="6" font-family="monospace">CAM-4 · SALA SERVERS</text>
  <circle cx="450" cy="147" r="4" fill="#22C55E" class="p1"/>
  <text x="442" y="150" text-anchor="end" fill="#22C55E" font-size="6" font-family="monospace">LIVE</text>

  <!-- Monitor stand -->
  <rect x="306" y="235" width="28" height="18" rx="2" fill="#1a2540"/>
  <rect x="280" y="252" width="80" height="8" rx="3" fill="#1a2540"/>

  <!-- ═══ IP CAMERAS ═══ -->
  <!-- Camera 1 (top left) -->
  <g transform="translate(48, 130)">
    <rect x="0" y="0" width="48" height="22" rx="5" fill="#1a2540" stroke="#1E3A5F" stroke-width="1"/>
    <ellipse cx="10" cy="11" rx="8" ry="8" fill="#0B1120" stroke="#1E3A5F" stroke-width=".8"/>
    <circle cx="10" cy="11" r="5" fill="#111827" stroke="#16B7CC" stroke-width=".6"/>
    <circle cx="10" cy="11" r="2.5" fill="#0B1120"/>
    <circle cx="10" cy="11" r="1" fill="#16B7CC" opacity=".6"/>
    <circle cx="40" cy="6" r="3" fill="#EF4444" class="r1"/>
    <rect x="20" y="7" width="18" height="8" rx="2" fill="#0B1120" stroke="#2a3550" stroke-width=".5"/>
    <!-- Scan cone -->
    <path d="M10 11 L-20 -30 L40 -30 Z" fill="#16B7CC" opacity="0.05" class="sc"/>
    <text x="24" y="34" text-anchor="middle" fill="#94A3B8" font-size="6.5" font-family="monospace">DS-2CD</text>
  </g>

  <!-- Camera 2 (top right) -->
  <g transform="translate(544, 130)">
    <rect x="0" y="0" width="48" height="22" rx="5" fill="#1a2540" stroke="#1E3A5F" stroke-width="1"/>
    <ellipse cx="10" cy="11" rx="8" ry="8" fill="#0B1120" stroke="#1E3A5F" stroke-width=".8"/>
    <circle cx="10" cy="11" r="5" fill="#111827" stroke="#16B7CC" stroke-width=".6"/>
    <circle cx="10" cy="11" r="2.5" fill="#0B1120"/>
    <circle cx="10" cy="11" r="1" fill="#16B7CC" opacity=".6"/>
    <circle cx="40" cy="6" r="3" fill="#22C55E" class="p3"/>
    <rect x="20" y="7" width="18" height="8" rx="2" fill="#0B1120" stroke="#2a3550" stroke-width=".5"/>
    <text x="24" y="34" text-anchor="middle" fill="#94A3B8" font-size="6.5" font-family="monospace">DS-2CD</text>
  </g>

  <!-- Camera lines to monitor -->
  <line x1="96" y1="140" x2="182" y2="160" stroke="#16B7CC" stroke-width="1" stroke-dasharray="5,4" opacity=".4" class="p1"/>
  <line x1="544" y1="140" x2="458" y2="160" stroke="#16B7CC" stroke-width="1" stroke-dasharray="5,4" opacity=".4" class="p2"/>

  <!-- ═══ NVR UNIT ═══ -->
  <rect x="200" y="285" width="240" height="55" rx="6" fill="#111827" stroke="#1E3A5F" stroke-width="1.5"/>
  <rect x="200" y="285" width="240" height="18" rx="6" fill="#1a2540"/>
  <rect x="200" y="294" width="240" height="9" fill="#1a2540"/>
  <text x="320" y="298" text-anchor="middle" fill="#16B7CC" font-size="8" font-family="monospace">NVR · HIKVISION DS-7616</text>
  <!-- Drive slots -->
  <rect x="212" y="307" width="18" height="24" rx="2" fill="#0B1120" stroke="#2a3550" stroke-width=".8"/>
  <rect x="233" y="307" width="18" height="24" rx="2" fill="#0B1120" stroke="#2a3550" stroke-width=".8"/>
  <rect x="254" y="307" width="18" height="24" rx="2" fill="#0B1120" stroke="#2a3550" stroke-width=".8"/>
  <rect x="275" y="307" width="18" height="24" rx="2" fill="#0B1120" stroke="#2a3550" stroke-width=".8"/>
  <!-- Drive LEDs -->
  <circle cx="221" cy="306" r="2" fill="#22C55E" class="p1"/>
  <circle cx="242" cy="306" r="2" fill="#22C55E" class="p2"/>
  <circle cx="263" cy="306" r="2" fill="#16B7CC" class="p3"/>
  <circle cx="284" cy="306" r="2" fill="#22C55E" class="p1"/>
  <text x="310" y="318" fill="#94A3B8" font-size="7.5" font-family="monospace">4× 4TB · 16TB total</text>
  <text x="310" y="329" fill="#22C55E" font-size="7" font-family="monospace">● Grabando · 8 canales</text>

  <!-- Status bar -->
  <rect x="50" y="390" width="540" height="30" rx="6" fill="rgba(15,23,42,.9)" stroke="#1E3A5F" stroke-width="1"/>
  <circle cx="72" cy="405" r="5" fill="#EF4444" class="r1"/>
  <text x="84" y="409" fill="#EF4444" font-size="8" font-family="monospace">⚠ MOVIMIENTO EN CAM-3</text>
  <circle cx="340" cy="405" r="5" fill="#22C55E" class="p2"/>
  <text x="352" y="409" fill="#22C55E" font-size="8" font-family="monospace">4 cámaras activas · Hikvision</text>

  <!-- Storage indicator -->
  <rect x="186" y="355" width="268" height="22" rx="5" fill="#0B1120" stroke="#1E3A5F" stroke-width=".8"/>
  <rect x="188" y="357" width="180" height="18" rx="4" fill="#16B7CC" opacity=".55"/>
  <text x="320" y="369" text-anchor="middle" fill="white" font-size="7.5" font-family="monospace">Almacenamiento: 67% · 30 días</text>
</svg>
