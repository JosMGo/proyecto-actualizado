<!DOCTYPE html>

<head>

  <!-- ── SEO (en pausa mientras dura el mantenimiento) ──────────────────────
       Se conservan title/description/OG idénticos al sitio original para
       que, al reactivar la indexación, Google no vea un cambio brusco.
       Reemplaza https://www.tudominio.com por tu dominio real. -->
  <meta name="description" content="SIRT — Redes y telecomunicaciones en Bolivia. Conectividad, videovigilancia, ciberseguridad y soluciones TI para empresas. Partners oficiales de Hikvision, MikroTik y Ubiquiti." />
  <link rel="canonical" href="https://www.tudominio.com/index.html" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/jpeg" href="img/LOGO.jpeg" />
  <meta name="theme-color" content="#185FA5" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="es_BO" />
  <meta property="og:site_name" content="SIRT" />
  <meta property="og:title" content="SIRT — Redes y Telecomunicaciones" />
  <meta property="og:description" content="Conectividad, videovigilancia y soluciones TI para empresas en Bolivia. Partners oficiales de Hikvision, MikroTik y Ubiquiti." />
  <meta property="og:url" content="https://www.tudominio.com/index.html" />
  <meta property="og:image" content="https://www.tudominio.com/img/LOGO.jpeg" />

  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      background: #0b1220;
      color: #f2f5fa;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
    }
    .logo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 24px;
      box-shadow: 0 0 0 4px rgba(24,95,165,0.35);
    }
    h1 {
      font-size: 1.6rem;
      margin: 0 0 12px;
      font-weight: 700;
    }
    p {
      font-size: 1rem;
      line-height: 1.5;
      color: #b8c2d6;
      margin: 0 0 8px;
    }
    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(24,95,165,0.15);
      color: #6fb3ff;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="img/LOGO.jpeg" alt="SIRT Logo" />
    <h1>Estamos actualizando nuestro sitio</h1>
    <p>Muy pronto volveremos con una experiencia renovada.</p>
    <p>Para consultas urgentes, escríbenos a <a href="mailto:info@sirtsc.com" style="color:#6fb3ff;">info@sirtsc.com</a>.</p>
    <span class="badge">Vuelve pronto</span>
  </div>
</body>
