<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440">
  <defs>
    <radialGradient id="ng" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
    </radialGradient>
    <filter id="gn">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#16B7CC" opacity="0.2"/>
    </pattern>
    <style>
      .p1{animation:pulse 2.2s ease-in-out infinite}
      .p2{animation:pulse 2.8s ease-in-out infinite .6s}
      .p3{animation:pulse 3.1s ease-in-out infinite 1.2s}
      .fl{animation:flow 2.5s linear infinite}
      .fl2{animation:flow 3s linear infinite .8s}
      .fl3{animation:flow 2s linear infinite 1.5s}
      @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
      @keyframes flow{0%{stroke-dashoffset:60}100%{stroke-dashoffset:0}}
    </style>
  </defs>

  <rect width="640" height="440" fill="#0B1120"/>
  <rect width="640" height="440" fill="url(#ng)"/>
  <rect width="640" height="440" fill="url(#dots)"/>

  <!-- ═══ CENTRAL ROUTER / FIREWALL ═══ -->
  <rect x="256" y="176" width="128" height="88" rx="10" fill="#111827" stroke="#16B7CC" stroke-width="1.5"/>
  <rect x="256" y="176" width="128" height="22" rx="10" fill="#1a2540"/>
  <rect x="256" y="186" width="128" height="12" fill="#1a2540"/>
  <text x="320" y="192" text-anchor="middle" fill="#16B7CC" font-size="8" font-family="monospace">CORE ROUTER</text>
  <!-- Router ports -->
  <rect x="268" y="205" width="14" height="10" rx="2" fill="#0B1120" stroke="#16B7CC" stroke-width=".8"/>
  <rect x="286" y="205" width="14" height="10" rx="2" fill="#0B1120" stroke="#16B7CC" stroke-width=".8"/>
  <rect x="304" y="205" width="14" height="10" rx="2" fill="#0B1120" stroke="#16B7CC" stroke-width=".8"/>
  <rect x="322" y="205" width="14" height="10" rx="2" fill="#0B1120" stroke="#16B7CC" stroke-width=".8"/>
  <rect x="340" y="205" width="14" height="10" rx="2" fill="#0B1120" stroke="#16B7CC" stroke-width=".8"/>
  <rect x="358" y="205" width="14" height="10" rx="2" fill="#0B1120" stroke="#16B7CC" stroke-width=".8"/>
  <circle cx="275" cy="204" r="2" fill="#22C55E" class="p1"/>
  <circle cx="293" cy="204" r="2" fill="#16B7CC" class="p2"/>
  <circle cx="311" cy="204" r="2" fill="#22C55E" class="p3"/>
  <circle cx="329" cy="204" r="2" fill="#16B7CC" class="p1"/>
  <circle cx="347" cy="204" r="2" fill="#EAB308" class="p2"/>
  <circle cx="365" cy="204" r="2" fill="#22C55E" class="p3"/>
  <!-- Status LEDs -->
  <circle cx="275" cy="247" r="5" fill="#22C55E" filter="url(#gn)" class="p1"/>
  <circle cx="295" cy="247" r="5" fill="#16B7CC" filter="url(#gn)" class="p2"/>
  <text x="320" y="251" text-anchor="middle" fill="#16B7CC" font-size="7.5" font-family="monospace">MikroTik CCR2004</text>
  <text x="320" y="262" text-anchor="middle" fill="#22C55E" font-size="7" font-family="monospace">● 99.9% uptime</text>

  <!-- ═══ INTERNET CLOUD ═══ -->
  <!-- Cloud shape -->
  <ellipse cx="320" cy="72" rx="70" ry="36" fill="#111827" stroke="#1E3A5F" stroke-width="1.5"/>
  <ellipse cx="280" cy="82" rx="38" ry="26" fill="#111827" stroke="#1E3A5F" stroke-width="1.5"/>
  <ellipse cx="360" cy="82" rx="38" ry="26" fill="#111827" stroke="#1E3A5F" stroke-width="1.5"/>
  <text x="320" y="72" text-anchor="middle" fill="#16B7CC" font-size="11" font-family="monospace" font-weight="bold">INTERNET</text>
  <text x="320" y="86" text-anchor="middle" fill="#94A3B8" font-size="8" font-family="monospace">1 Gbps Fiber</text>
  <!-- Connection line Internet → Router -->
  <line x1="320" y1="108" x2="320" y2="176" stroke="#16B7CC" stroke-width="2.5" stroke-dasharray="8,4" class="fl"/>

  <!-- ═══ SWITCH DISTRIBUTION ═══ -->
  <!-- Left switch -->
  <rect x="70" y="220" width="90" height="50" rx="7" fill="#111827" stroke="#1E3A5F" stroke-width="1.2"/>
  <text x="115" y="238" text-anchor="middle" fill="#16B7CC" font-size="7.5" font-family="monospace">SWITCH L2</text>
  <circle cx="88" cy="252" r="4" fill="#22C55E" filter="url(#gn)" class="p2"/>
  <circle cx="101" cy="252" r="4" fill="#16B7CC" filter="url(#gn)" class="p3"/>
  <text x="115" y="258" text-anchor="middle" fill="#94A3B8" font-size="6.5" font-family="monospace">24 puertos</text>
  <!-- Line to router -->
  <line x1="160" y1="245" x2="256" y2="220" stroke="#0066FF" stroke-width="2" stroke-dasharray="6,3" class="fl2"/>

  <!-- Right switch -->
  <rect x="480" y="220" width="90" height="50" rx="7" fill="#111827" stroke="#1E3A5F" stroke-width="1.2"/>
  <text x="525" y="238" text-anchor="middle" fill="#16B7CC" font-size="7.5" font-family="monospace">SWITCH L2</text>
  <circle cx="498" cy="252" r="4" fill="#22C55E" filter="url(#gn)" class="p1"/>
  <circle cx="511" cy="252" r="4" fill="#16B7CC" filter="url(#gn)" class="p2"/>
  <text x="525" y="258" text-anchor="middle" fill="#94A3B8" font-size="6.5" font-family="monospace">24 puertos</text>
  <!-- Line to router -->
  <line x1="480" y1="245" x2="384" y2="220" stroke="#0066FF" stroke-width="2" stroke-dasharray="6,3" class="fl3"/>

  <!-- ═══ END DEVICES ═══ -->
  <!-- PC 1 -->
  <rect x="30" y="330" width="60" height="46" rx="6" fill="#111827" stroke="#1E3A5F" stroke-width="1"/>
  <rect x="35" y="336" width="50" height="28" rx="3" fill="#0B1120"/>
  <rect x="37" y="338" width="46" height="24" rx="2" fill="#0F1729"/>
  <circle cx="60" cy="350" r="6" fill="#16B7CC" opacity=".4"/>
  <text x="60" y="353" text-anchor="middle" fill="#16B7CC" font-size="7">PC</text>
  <text x="60" y="385" text-anchor="middle" fill="#94A3B8" font-size="6.5" font-family="monospace">Workstation</text>
  <line x1="60" y1="330" x2="90" y2="270" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5,3" class="fl"/>

  <!-- Server 2 -->
  <rect x="120" y="330" width="60" height="46" rx="6" fill="#111827" stroke="#1E3A5F" stroke-width="1"/>
  <rect x="128" y="337" width="44" height="6" rx="2" fill="#1a2540"/>
  <rect x="128" y="346" width="44" height="6" rx="2" fill="#1a2540"/>
  <rect x="128" y="355" width="44" height="6" rx="2" fill="#1a2540"/>
  <circle cx="136" cy="340" r="2.5" fill="#22C55E" class="p2"/>
  <circle cx="136" cy="349" r="2.5" fill="#22C55E" class="p3"/>
  <circle cx="136" cy="358" r="2.5" fill="#16B7CC" class="p1"/>
  <text x="150" y="385" text-anchor="middle" fill="#94A3B8" font-size="6.5" font-family="monospace">Servidor</text>
  <line x1="150" y1="330" x2="115" y2="270" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5,3" class="fl2"/>

  <!-- AP / WiFi -->
  <rect x="285" y="330" width="70" height="46" rx="6" fill="#111827" stroke="#1E3A5F" stroke-width="1"/>
  <!-- WiFi icon -->
  <path d="M320 360 L320 355" stroke="#16B7CC" stroke-width="2" stroke-linecap="round"/>
  <path d="M310 352 Q320 345 330 352" stroke="#16B7CC" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M304 347 Q320 338 336 347" stroke="#16B7CC" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".7"/>
  <path d="M298 342 Q320 331 342 342" stroke="#16B7CC" stroke-width="1.2" fill="none" stroke-linecap="round" opacity=".4"/>
  <text x="320" y="385" text-anchor="middle" fill="#94A3B8" font-size="6.5" font-family="monospace">Access Point</text>
  <text x="320" y="393" text-anchor="middle" fill="#16B7CC" font-size="6" font-family="monospace">Ubiquiti U6</text>
  <line x1="320" y1="330" x2="320" y2="264" stroke="#16B7CC" stroke-width="1.5" stroke-dasharray="5,3" class="fl3"/>

  <!-- IP Camera -->
  <rect x="460" y="330" width="70" height="46" rx="6" fill="#111827" stroke="#1E3A5F" stroke-width="1"/>
  <circle cx="495" cy="348" rx="14" ry="10" r="12" fill="#0B1120" stroke="#1E3A5F" stroke-width="1"/>
  <circle cx="495" cy="348" r="7" fill="#1a2540" stroke="#16B7CC" stroke-width=".8"/>
  <circle cx="495" cy="348" r="3.5" fill="#0B1120"/>
  <circle cx="495" cy="348" r="1.5" fill="#16B7CC" opacity=".6"/>
  <circle cx="472" cy="336" r="3" fill="#EF4444" class="p1" opacity=".8"/>
  <text x="495" y="385" text-anchor="middle" fill="#94A3B8" font-size="6.5" font-family="monospace">IP Camera</text>
  <text x="495" y="393" text-anchor="middle" fill="#16B7CC" font-size="6" font-family="monospace">Hikvision</text>
  <line x1="495" y1="330" x2="510" y2="270" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5,3" class="fl"/>

  <!-- Firewall badge -->
  <rect x="555" y="330" width="68" height="46" rx="6" fill="#111827" stroke="#1E3A5F" stroke-width="1"/>
  <rect x="564" y="338" width="50" height="30" rx="3" fill="#0B1120"/>
  <text x="589" y="351" text-anchor="middle" fill="#EF4444" font-size="13">🛡</text>
  <text x="589" y="368" text-anchor="middle" fill="#EF4444" font-size="7" font-family="monospace">Firewall</text>
  <text x="589" y="385" text-anchor="middle" fill="#94A3B8" font-size="6.5" font-family="monospace">FortiGate</text>
  <line x1="589" y1="330" x2="540" y2="270" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5,3" class="fl2"/>

  <!-- ═══ BANDWIDTH PANEL ═══ -->
  <rect x="30" y="155" width="130" height="52" rx="8" fill="rgba(15,23,42,0.95)" stroke="#1E3A5F" stroke-width="1"/>
  <text x="95" y="172" text-anchor="middle" fill="#0066FF" font-size="8" font-family="monospace" font-weight="bold">ANCHO DE BANDA</text>
  <rect x="40" y="178" width="110" height="8" rx="4" fill="#0B1120"/>
  <rect x="40" y="178" width="88" height="8" rx="4" fill="#0066FF" opacity=".75" />
  <text x="40" y="200" fill="#94A3B8" font-size="7" font-family="monospace">↑ 320 Mbps · ↓ 680 Mbps</text>

  <!-- Latency panel -->
  <rect x="480" y="155" width="130" height="52" rx="8" fill="rgba(15,23,42,0.95)" stroke="#1E3A5F" stroke-width="1"/>
  <text x="545" y="172" text-anchor="middle" fill="#22C55E" font-size="8" font-family="monospace" font-weight="bold">LATENCIA</text>
  <text x="545" y="194" text-anchor="middle" fill="#22C55E" font-size="20" font-weight="900" font-family="monospace">2ms</text>
</svg>
