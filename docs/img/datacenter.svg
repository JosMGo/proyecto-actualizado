<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440">
  <defs>
    <radialGradient id="roomGlow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#16B7CC" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="floor" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#0D1525" stroke="#1a2540" stroke-width="0.5"/>
    </pattern>
    <style>
      .lb{animation:lb 2s ease-in-out infinite}.lb2{animation:lb 2.8s ease-in-out infinite .5s}
      .lb3{animation:lb 1.7s ease-in-out infinite 1s}.lb4{animation:lb 3.1s ease-in-out infinite .3s}
      @keyframes lb{0%,80%,100%{opacity:1}85%{opacity:.1}}
    </style>
  </defs>

